<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Zniper Traveling</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; }
        nav { padding: 40px; border-bottom: 1px solid #111; display: flex; gap: 20px; }
        .galeria { padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .galeria img { width: 100%; filter: grayscale(1); transition: 0.5s; }
        .galeria img:hover { filter: grayscale(0); }
        footer { padding: 40px; text-align: center; border-top: 1px solid #111; }
        a { color: #666; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav id="menu">
        <a href="/">INICIO</a>
    </nav>
    
    <div class="galeria" id="contenedor-fotos"></div>

    <footer id="footer">
        <div id="redes-sociales"></div>
    </footer>

    <script>
        async function cargarWeb() {
            const r = await fetch('/api/datos');
            const datos = await r.json();
            
            // Render fotos
            document.getElementById('contenedor-fotos').innerHTML = datos.fotos.map(f => `
                <img src="${f.url}">
            `).join('');

            // Render redes
            document.getElementById('redes-sociales').innerHTML = (datos.redes || []).map(r => `
                <a href="${r.url}" target="_blank" style="margin: 0 10px">${r.nombre.toUpperCase()}</a>
            `).join('');
        }
        cargarWeb();
    </script>
</body>
</html>
