<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Zniper Admin · Funcional</title>
    <style>
        :root { --bg: #050505; --accent: #fff; --text: #ccc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; margin: 0; }
        .sidebar { width: 220px; border-right: 1px solid #222; height: 100vh; padding: 20px; }
        .main { flex: 1; padding: 40px; }
        .tab { display: none; }
        .tab.active { display: block; }
        .nav-btn { display: block; width: 100%; padding: 10px; background: none; color: #666; border: none; text-align: left; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .nav-btn.active { color: #fff; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; }
        button.save { background: #fff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>ZNIPER</h3>
        <button class="nav-btn active" onclick="showTab('t-galeria')">Galería</button>
        <button class="nav-btn" onclick="showTab('t-blog')">Blog</button>
        <button class="nav-btn" onclick="showTab('t-redes')">Redes</button>
    </div>
    <div class="main">
        <div id="t-galeria" class="tab active">
            <h2>Subir a Galería</h2>
            <input type="file" id="f-file">
            <input type="text" id="f-tema" placeholder="Tema/Categoría">
            <button class="save" onclick="subirFoto()">Subir Imagen</button>
            <div id="lista-fotos" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; margin-top:20px;"></div>
        </div>
        
        <div id="t-blog" class="tab">
            <h2>Nuevo Artículo</h2>
            <input type="text" id="b-titulo" placeholder="Título">
            <textarea id="b-texto" placeholder="Contenido..."></textarea>
            <button class="save" onclick="guardarBlog()">Publicar</button>
        </div>

        <div id="t-redes" class="tab">
            <h2>Redes</h2>
            <div id="lista-redes"></div>
            <input type="text" id="r-nombre" placeholder="Red">
            <input type="text" id="r-url" placeholder="URL">
            <button class="save" onclick="agregarRed()">Guardar Red</button>
        </div>
    </div>

    <script>
        let datos = { fotos: [], blog: [], redes: [], config: {} };

        async function cargar() {
            const r = await fetch('/api/datos');
            datos = await r.json();
            renderFotos();
            renderRedes();
        }

        async function sincronizar() {
            await fetch('/api/save', { // Asegúrate de que en app.py la ruta sea /api/save o /api/update_all
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });
            alert("Sincronizado con el servidor");
            cargar();
        }

        async function subirFoto() {
            const file = document.getElementById('f-file').files[0];
            const formData = new FormData();
            formData.append('file', file);
            const r = await fetch('/api/upload', { method: 'POST', body: formData });
            const res = await r.json();
            datos.fotos.push({ url: res.url, tema: document.getElementById('f-tema').value });
            sincronizar();
        }

        function agregarRed() {
            if(!datos.redes) datos.redes = [];
            datos.redes.push({ nombre: document.getElementById('r-nombre').value, url: document.getElementById('r-url').value });
            sincronizar();
        }

        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function renderFotos() {
            document.getElementById('lista-fotos').innerHTML = datos.fotos.map(f => `<img src="${f.url}" style="width:100%">`).join('');
        }

        function renderRedes() {
            document.getElementById('lista-redes').innerHTML = (datos.redes || []).map(r => `<div>${r.nombre}</div>`).join('');
        }

        cargar();
    </script>
</body>
</html>
