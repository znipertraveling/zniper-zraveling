<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Zniper Admin · Conexión Real</title>
    <style>
        :root { --bg: #050505; --accent: #fff; --text: #ccc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; margin: 0; height: 100vh; }
        .sidebar { width: 240px; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .nav-btn { width: 100%; padding: 12px; margin-bottom: 5px; background: none; border: none; color: #555; text-align: left; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        .nav-btn.active { color: #fff; background: #111; border-radius: 4px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .form-group { background: #0a0a0a; padding: 20px; border: 1px solid #1a1a1a; margin-bottom: 20px; border-radius: 8px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; }
        .btn-action { background: #fff; color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; font-size: 0.7rem; border-radius: 4px; }
        .item-list { margin-top: 20px; }
        .item-card { background: #111; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="letter-spacing: 3px; font-size: 1rem; text-align: center; margin-bottom: 30px;">ZNIPER ADMIN</h2>
    <button class="nav-btn active" onclick="tab(event, 'p-fotos')">📸 Galería</button>
    <button class="nav-btn" onclick="tab(event, 'p-blog')">📰 Blog</button>
    <button class="nav-btn" onclick="tab(event, 'p-series')">🎬 Series</button>
    <button class="nav-btn" onclick="tab(event, 'p-paginas')">📄 Páginas</button>
    <button class="nav-btn" onclick="tab(event, 'p-cred')">🔐 Seguridad</button>
</div>

<div class="main">
    <div id="p-fotos" class="tab-panel active">
        <h2>Galería</h2>
        <div class="form-group">
            <label>Subir Imagen</label>
            <input type="file" id="f-file">
            <input type="text" id="f-tema" placeholder="Tema (ej: Urbano)">
            <button class="btn-action" onclick="subirFoto()">SUBIR A GALERÍA</button>
        </div>
        <div id="lista-fotos" class="item-list"></div>
    </div>

    <div id="p-blog" class="tab-panel">
        <h2>Nueva Entrada de Blog</h2>
        <div class="form-group">
            <input type="text" id="b-titulo" placeholder="Título del artículo">
            <textarea id="b-texto" rows="6" placeholder="Contenido..."></textarea>
            <button class="btn-action" onclick="publicarBlog()">PUBLICAR EN BITÁCORA</button>
        </div>
        <div id="lista-blog"></div>
    </div>

    <div id="p-series" class="tab-panel">
        <h2>Crear Serie Fotográfica</h2>
        <div class="form-group">
            <input type="text" id="s-titulo" placeholder="Nombre de la serie">
            <textarea id="s-desc" placeholder="Descripción del concepto..."></textarea>
            <button class="btn-action" onclick="crearSerie()">CREAR SERIE</button>
        </div>
        <div id="lista-series"></div>
    </div>

    <div id="p-paginas" class="tab-panel">
        <h2>Secciones Dinámicas</h2>
        <div class="form-group">
            <input type="text" id="pg-titulo" placeholder="Nombre de la página">
            <button class="btn-action" onclick="crearPagina()">AGREGAR SECCIÓN</button>
        </div>
        <div id="lista-paginas"></div>
    </div>

    <div id="p-cred" class="tab-panel">
        <h2>Actualizar Acceso</h2>
        <div class="form-group">
            <input type="text" id="u-nick" placeholder="Nuevo Usuario">
            <input type="password" id="u-pass" placeholder="Nueva Contraseña">
            <button class="btn-action" style="background: red; color: white;" onclick="actualizarCreds()">CAMBIAR CREDENCIALES</button>
        </div>
    </div>
</div>

<script>
    let datosLocales = {};

    async function cargar() {
        const r = await fetch('/api/datos');
        datosLocales = await r.json();
        renderTodo();
    }

    function tab(e, id) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    // --- ACCIONES USANDO TUS RUTAS REALES ---

    async function subirFoto() {
        const file = document.getElementById('f-file').files[0];
        const tema = document.getElementById('f-tema').value;
        if(!file) return alert("Selecciona un archivo");

        const formData = new FormData();
        formData.append('file', file);
        formData.append('tema', tema);

        const r = await fetch('/api/subir-foto', { method: 'POST', body: formData });
        if(r.ok) { alert("Foto subida!"); cargar(); }
    }

    async function publicarBlog() {
        const b = { titulo: document.getElementById('b-titulo').value, contenido: document.getElementById('b-texto').value };
        const r = await fetch('/api/blog', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(b)
        });
        if(r.ok) { alert("Blog publicado!"); cargar(); }
    }

    async function crearSerie() {
        const s = { titulo: document.getElementById('s-titulo').value, descripcion: document.getElementById('s-desc').value };
        const r = await fetch('/api/series', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(s)
        });
        if(r.ok) { alert("Serie creada!"); cargar(); }
    }

    async function crearPagina() {
        const p = { titulo: document.getElementById('pg-titulo').value };
        const r = await fetch('/api/paginas', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(p)
        });
        if(r.ok) { alert("Página agregada!"); cargar(); }
    }

    async function actualizarCreds() {
        const c = { nickname: document.getElementById('u-nick').value, password: document.getElementById('u-pass').value };
        const r = await fetch('/api/credenciales', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(c)
        });
        if(r.ok) alert("Seguridad actualizada!");
    }

    async function borrarItem(ruta, id) {
        if(confirm("¿Seguro?")) {
            await fetch(`${ruta}/${id}`, { method: 'DELETE' });
            cargar();
        }
    }

    function renderTodo() {
        document.getElementById('lista-fotos').innerHTML = (datosLocales.fotos || []).map(f => `
            <div class="item-card"><img src="${f.url}" style="width:50px"> <span>${f.tema || 'Sin tema'}</span> <button onclick="borrarItem('/api/fotos', ${f.id})">X</button></div>
        `).join('');
        
        document.getElementById('lista-blog').innerHTML = (datosLocales.blog || []).map(b => `
            <div class="item-card"><span>${b.titulo}</span> <button onclick="borrarItem('/api/blog', ${b.id})">X</button></div>
        `).join('');

        document.getElementById('lista-series').innerHTML = (datosLocales.series || []).map(s => `
            <div class="item-card"><span>${s.titulo}</span> <button onclick="borrarItem('/api/series', ${s.id})">X</button></div>
        `).join('');
    }

    cargar();
</script>
</body>
</html>
