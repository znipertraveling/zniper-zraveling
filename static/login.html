<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Zniper Admin · Acceso</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:#050505;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:1rem;}.login{background:#0a0a0a;padding:2rem;width:100%;max-width:380px;border:1px solid #222;text-align:center;}h1{color:#fff;font-size:1.5rem;font-weight:300;margin-bottom:0.5rem;}.subtitulo{color:#555;font-size:0.7rem;margin-bottom:2rem;}.grupo{margin-bottom:1rem;text-align:left;}label{color:#888;font-size:0.7rem;display:block;margin-bottom:0.2rem;}input{width:100%;background:#111;border:1px solid #333;padding:0.7rem;color:#fff;}button{width:100%;background:#fff;border:none;padding:0.7rem;color:#000;cursor:pointer;margin-top:0.5rem;text-transform:uppercase;}.error{background:rgba(255,0,0,0.1);border:1px solid #f00;color:#f88;padding:0.5rem;margin-bottom:1rem;display:none;}</style></head>
<body><div class="login"><h1>ZNIPER ADMIN</h1><div class="subtitulo">acceso restringido</div><div id="errorMsg" class="error"></div><div class="grupo"><label>NICKNAME</label><input type="text" id="nickname" autocomplete="off"></div><div class="grupo"><label>CONTRASEÑA</label><input type="password" id="password"></div><button id="loginBtn">INGRESAR</button></div>
<script>const btn=document.getElementById('loginBtn'),nick=document.getElementById('nickname'),pass=document.getElementById('password'),err=document.getElementById('errorMsg');btn.onclick=async()=>{if(!nick.value.trim()||!pass.value){err.textContent='Completa ambos campos';err.style.display='block';return;}btn.disabled=true;btn.textContent='VERIFICANDO...';try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname:nick.value.trim(),password:pass.value})});const data=await r.json();if(data.success){sessionStorage.setItem('zniper_auth','true');window.location.href='/admin';}else{err.textContent='Acceso denegado';err.style.display='block';}}catch(e){err.textContent='Error de conexión';err.style.display='block';}finally{btn.disabled=false;btn.textContent='INGRESAR';}};</script></body></html>
